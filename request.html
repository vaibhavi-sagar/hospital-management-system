<section class="request">

<h1>Request Food</h1>

<p>
Fill in the form below if you need food assistance.
</p>

<form id="requestForm">

<input type="text"
id="rname"
placeholder="Full Name"
required>

<input type="tel"
id="rphone"
placeholder="Phone Number"
required>

<input type="email"
id="remail"
placeholder="Email Address"
required>

<input type="number"
id="people"
placeholder="Number of People"
required>

<select id="foodNeeded" required>

<option value="">Food Required</option>

<option>Cooked Food</option>
<option>Packed Food</option>
<option>Vegetarian</option>
<option>Non-Vegetarian</option>

</select>

<textarea
id="raddress"
rows="4"
placeholder="Delivery Address"
required></textarea>

<select id="urgency">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

<textarea
id="rnotes"
rows="4"
placeholder="Additional Notes"></textarea>

<button type="submit">
Submit Request
</button>

</form>

</section>
