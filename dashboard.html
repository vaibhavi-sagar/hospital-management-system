<section class="dashboard">

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="dashboard-card">

<i class="fas fa-box"></i>

<h2 id="totalDonations">0</h2>

<p>Total Donations</p>

</div>

<div class="dashboard-card">

<i class="fas fa-hand-holding-heart"></i>

<h2 id="totalRequests">0</h2>

<p>Total Requests</p>

</div>

<div class="dashboard-card">

<i class="fas fa-users"></i>

<h2 id="totalUsers">0</h2>

<p>Total Donors</p>

</div>

</div>


<h2>Recent Food Donations</h2>

<table>

<thead>

<tr>
    <th>Name</th>
    <th>Food Type</th>
    <th>Quantity</th>
    <th>Phone</th>
    <th>Action</th>
</tr>


</thead>

<tbody id="donationTable">

<tr>

<td colspan="4">

No Donations Yet

</td>

</tr>

</tbody>

</table>


<h2 style="margin-top:60px;">

Recent Food Requests

</h2>

<table>

<thead>



<tr>
    <th>Name</th>
    <th>People</th>
    <th>Food</th>
    <th>Phone</th>
    <th>Action</th>
</tr>


</thead>

<tbody id="requestTable">

<tr>

<td colspan="4">

No Requests Yet

</td>

</tr>

</tbody>

</table>
